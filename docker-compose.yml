services:
  postgres:
    image: postgres:16-alpine
    container_name: payknot-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: payknot-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: payknot-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      SOLANA_RPC_URL: ${SOLANA_RPC_URL}
      USDC_MINT: ${USDC_MINT}
      MERCHANT_WALLET: ${MERCHANT_WALLET}
      AUTH_JWT_SECRET: ${AUTH_JWT_SECRET}
      AUTH_COOKIE_NAME: ${AUTH_COOKIE_NAME}
      AUTH_COOKIE_SECURE: ${AUTH_COOKIE_SECURE}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
    ports:
      - "8080:8080"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_SOLANA_RPC_URL: ${NEXT_PUBLIC_SOLANA_RPC_URL}
        NEXT_PUBLIC_USDC_MINT: ${NEXT_PUBLIC_USDC_MINT}
        NEXT_PUBLIC_MERCHANT_WALLET: ${NEXT_PUBLIC_MERCHANT_WALLET}
        NEXT_PUBLIC_GOOGLE_CLIENT_ID: ${NEXT_PUBLIC_GOOGLE_CLIENT_ID}
        API_PROXY_TARGET: ${API_PROXY_TARGET}
    container_name: payknot-frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      API_PROXY_TARGET: ${API_PROXY_TARGET}
      PORT: 3000
    ports:
      - "3000:3000"

volumes:
  postgres_data:
