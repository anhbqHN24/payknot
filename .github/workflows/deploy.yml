name: Production CI/CD

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: payknot-prod-deploy
  cancel-in-progress: true

env:
  IMAGE_REPO: ghcr.io/anhbqhn24/payknot

jobs:
  build-and-push:
    # Fast path: native ARM runner (no QEMU emulation)
    runs-on: [self-hosted, linux, arm64]
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Build & Push Backend (arm64 native)
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          platforms: linux/arm64
          push: true
          provenance: false
          tags: |
            ${{ env.IMAGE_REPO }}/backend:${{ github.sha }}
            ${{ env.IMAGE_REPO }}/backend:latest
          cache-from: type=gha,scope=backend
          cache-to: type=gha,scope=backend,mode=max

      - name: Build & Push Frontend (arm64 native)
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          platforms: linux/arm64
          push: true
          provenance: false
          build-args: |
            API_PROXY_TARGET=http://backend:8080
          tags: |
            ${{ env.IMAGE_REPO }}/frontend:${{ github.sha }}
            ${{ env.IMAGE_REPO }}/frontend:latest
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,scope=frontend,mode=max

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: ${{ secrets.EC2_PORT || 22 }}
          script_stop: true
          script: |
            set -euo pipefail
            DEPLOY_ROOT="/home/ubuntu/payknot-deploy"
            IMAGE_REPO="ghcr.io/anhbqhn24/payknot"
            IMAGE_TAG="${{ github.sha }}"

            cd "$DEPLOY_ROOT"

            # Login for image pulls using workflow token
            echo "${{ github.token }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

            # Compose override for image-based deploy
            cat > docker-compose.ghcr.yml <<EOF
            services:
              backend:
                image: ${IMAGE_REPO}/backend:${IMAGE_TAG}
                pull_policy: always
              frontend:
                image: ${IMAGE_REPO}/frontend:${IMAGE_TAG}
                pull_policy: always
            EOF

            docker compose -f docker-compose.yml -f docker-compose.ghcr.yml pull backend frontend
            docker compose -f docker-compose.yml -f docker-compose.ghcr.yml up -d --no-build --force-recreate

            docker compose ps
            docker image prune -f
