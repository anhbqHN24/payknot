name: Production CI/CD

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: payknot-prod-deploy
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_REPO: ghcr.io/anhbqhn24/payknot

jobs:
  build-and-push:
    # Uses native ARM64 runners to avoid slow QEMU emulation
    runs-on: ubuntu-24.04-arm 
    strategy:
      matrix:
        component: [backend, frontend]
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & Push ${{ matrix.component }}
        uses: docker/build-push-action@v6
        with:
          context: ./${{ matrix.component }}
          # No platforms tag needed because we are on a native arm64 runner
          push: true
          build-args: |
            API_PROXY_TARGET=http://backend:8080
            NEXT_PUBLIC_SOLANA_RPC_URL=${{ vars.NEXT_PUBLIC_SOLANA_RPC_URL }}
            NEXT_PUBLIC_USDC_MINT=${{ vars.NEXT_PUBLIC_USDC_MINT }}
            NEXT_PUBLIC_MERCHANT_WALLET=${{ vars.NEXT_PUBLIC_MERCHANT_WALLET }}
            NEXT_PUBLIC_GOOGLE_CLIENT_ID=${{ vars.NEXT_PUBLIC_GOOGLE_CLIENT_ID }}
          tags: |
            ${{ env.IMAGE_REPO }}/${{ matrix.component }}:${{ github.sha }}
            ${{ env.IMAGE_REPO }}/${{ matrix.component }}:latest
          cache-from: type=gha,scope=${{ matrix.component }}
          cache-to: type=gha,mode=max,scope=${{ matrix.component }}

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: ${{ secrets.EC2_PORT || 22 }}
          script_stop: true
          script: |
            set -euo pipefail
            DEPLOY_ROOT="/home/ubuntu/payknot-deploy"
            IMAGE_REPO="ghcr.io/anhbqhn24/payknot"
            IMAGE_TAG="${{ github.sha }}"

            mkdir -p "$DEPLOY_ROOT"
            cd "$DEPLOY_ROOT"

            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

            # Generate the dynamic override file (printf avoids heredoc indentation issues)
            printf '%s\n' \
              'services:' \
              '  backend:' \
              "    image: ${IMAGE_REPO}/backend:${IMAGE_TAG}" \
              '    pull_policy: always' \
              '  frontend:' \
              "    image: ${IMAGE_REPO}/frontend:${IMAGE_TAG}" \
              '    pull_policy: always' \
              > docker-compose.ghcr.yml

            # Validate compose syntax before deploy
            docker compose -f docker-compose.yml -f docker-compose.ghcr.yml config >/dev/null

            # Pull and Update
            docker compose -f docker-compose.yml -f docker-compose.ghcr.yml pull
            docker compose -f docker-compose.yml -f docker-compose.ghcr.yml up -d --no-build --force-recreate

            # Cleanup old layers to save space on t4g.small
            docker image prune -f